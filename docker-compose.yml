version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mitogex
      - POSTGRES_PASSWORD=mitogex_pass
      - POSTGRES_DB=mitogex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitogex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Storage (SeaweedFS)
  # Master, Volume, and S3 gateway in one for simplicity in self-hosting
  seaweedfs:
    image: chrislusf/seaweedfs
    command: 'server -s3 -dir=/data'
    ports:
      - "8333:8333" # Master
      - "8080:8080" # Volume
      - "8334:8334" # S3
    volumes:
      - seaweedfs_data:/data

  # Backend API
  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    environment:
      - DATABASE_URL=postgresql://mitogex:mitogex_pass@db/mitogex
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://seaweedfs:8334
      - S3_ACCESS_KEY=any
      - S3_SECRET_KEY=any
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker (Bioinformatics Heavy Lifter)
  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
      - ./Results:/results
      - ./data:/data
    environment:
      - DATABASE_URL=postgresql://mitogex:mitogex_pass@db/mitogex
      - REDIS_URL=redis://redis:6379/0
      - S3_ENDPOINT=http://seaweedfs:8334
      - S3_ACCESS_KEY=any
      - S3_SECRET_KEY=any
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  seaweedfs_data:
